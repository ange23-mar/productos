   # url: jdbc:mysql://localhost:3306/db_ms_producto
    #username: root
    #password: ""
    #driver-class-name: com.mysql.cj.jdbc.Driver

  # Configuración de JPA e Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

# Configuración limpia de Swagger para Spring Boot 3.x
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha